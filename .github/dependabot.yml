version: 2

# Updates are grouped: without grouping, Dependabot opens one PR per package,
# which for this project meant 20 PRs (and ~250 CI jobs) in a single run.
# One PR per ecosystem keeps the queue manageable while still surfacing everything.
updates:
  # Backend — Maven
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      backend-dependencies:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "backend"

  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      # Angular releases its packages in lockstep — a partial bump breaks the build.
      angular:
        patterns: ["@angular/*"]
      other-frontend-dependencies:
        patterns: ["*"]
        exclude-patterns: ["@angular/*"]
    labels:
      - "dependencies"
      - "frontend"

  # ML service — pip
  - package-ecosystem: "pip"
    directory: "/ml-service"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      ml-dependencies:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ml-service"

  # Dockerfiles — base image updates (security patches in Alpine/slim/nginx)
  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/frontend"
      - "/ml-service"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      docker-base-images:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions themselves — keep action versions current (avoids the
  # exact "unpinned/stale version" mistake we hit with trivy-action).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ci"
