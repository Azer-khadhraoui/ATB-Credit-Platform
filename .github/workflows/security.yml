name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan: new CVEs are published against code that hasn't changed.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------- Secrets
  secret-scan:
    name: Secret detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gitleaks scans the whole history, not just the tip.

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------- SAST
  codeql:
    name: Static analysis (CodeQL)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # ---------------------------------------------------------------- Dependencies
  dependency-scan:
    name: Dependency vulnerabilities (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan project dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          # Report only — the build shouldn't break on a transitive CVE with no fix yet.
          exit-code: '0'

      - name: Upload results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ---------------------------------------------------------------- Images
  image-scan:
    name: Image vulnerabilities (Trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t atb-${{ matrix.service }}:scan ./${{ matrix.service }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: atb-${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

  # ---------------------------------------------------------------- DAST
  # Everything above is static (SAST/SCA): it inspects code and images without
  # running them. This job attacks the application while it's actually running,
  # catching runtime issues (misconfigured headers, XSS, exposed endpoints)
  # that static analysis can't see.
  dast-scan:
    name: Dynamic scan (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: |
          cp .env.example .env
          docker compose up --build -d

      - name: Wait for the frontend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4200 > /dev/null && exit 0
            sleep 5
          done
          echo "Frontend never became ready" && exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:4200'
          cmd_options: '-I' # don't fail the job on WARN-level findings; report them
          fail_action: false
          allow_issue_writing: false # don't file a GitHub issue per scan run
          artifact_name: 'zap-report'

      - name: Stop the stack
        if: always()
        run: docker compose down
