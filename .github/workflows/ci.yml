name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------- Build & test
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    # BackendApplicationTests boots the full Spring context, which opens a MongoDB
    # connection (auto-index-creation runs at startup), so the test needs a real server.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: ./backend
        run: mvn -B clean verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build (production)
        working-directory: ./frontend
        run: npm run build -- --configuration production

  ml-service:
    name: ML Service (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./ml-service
        run: pip install -r requirements-docker.txt

      - name: Verify the service and model load
        working-directory: ./ml-service
        run: python -c "from app.main import app; from app.model import model_service; print('Model loaded:', model_service.model_name)"

  # ---------------------------------------------------------------- Docker images
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, ml-service]
    strategy:
      matrix:
        service: [backend, frontend, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          load: true
          tags: atb-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for the security scan
        run: docker save atb-${{ matrix.service }}:${{ github.sha }} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/image.tar
          retention-days: 1
