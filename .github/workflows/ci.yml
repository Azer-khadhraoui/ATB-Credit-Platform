name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------- Build & test
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    # A tag push targets a commit already validated on main; re-running the full
    # suite here would just repeat work. Only publish-images runs for tags.
    if: github.ref_type != 'tag'

    # BackendApplicationTests boots the full Spring context, which opens a MongoDB
    # connection (auto-index-creation runs at startup), so the test needs a real server.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: ./backend
        run: mvn -B clean verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Test with coverage
        working-directory: ./frontend
        # ubuntu runners ship Google Chrome; the no-sandbox launcher is required in CI.
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --code-coverage

      - name: Build (production)
        working-directory: ./frontend
        run: npm run build -- --configuration production

  ml-service:
    name: ML Service (FastAPI)
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./ml-service
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: ./ml-service
        run: python -m pytest -q --cov=app --cov-report=xml

  # ---------------------------------------------------------------- Code quality
  sonarcloud:
    name: Code quality (SonarCloud)
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    needs: [backend, frontend, ml-service]

    # The context test boots Spring, which connects to MongoDB; the scan runs the full
    # test suite so JaCoCo can measure coverage, so it needs the same server the backend job uses.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud needs full history for new-code / blame analysis.

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, test and measure coverage (for Java analysis)
        working-directory: ./backend
        run: mvn -B clean verify

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Test frontend with coverage (for JS/TS analysis)
        working-directory: ./frontend
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --code-coverage

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test ML service with coverage (for Python analysis)
        working-directory: ./ml-service
        run: |
          pip install -r requirements-dev.txt
          python -m pytest -q --cov=app --cov-report=xml

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ---------------------------------------------------------------- Docker images
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    needs: [backend, frontend, ml-service]
    strategy:
      matrix:
        service: [backend, frontend, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          load: true
          tags: atb-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for the security scan
        run: docker save atb-${{ matrix.service }}:${{ github.sha }} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/image.tar
          retention-days: 1

  # ---------------------------------------------------------------- Release
  # Only runs when a v* tag is pushed (see the release process: git tag v1.0.0 && git
  # push origin v1.0.0). Publishes the three images to GitHub Container Registry so
  # they can be pulled directly, e.g. `docker pull ghcr.io/<owner>/atb-backend:v1.0.0`.
  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the GitHub username (Azer-khadhraoui) is not.
      - name: Compute lowercase image owner
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/atb-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/atb-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
