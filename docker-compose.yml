services:
  mongo:
    image: mongo:7
    container_name: atb-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atb-network

  ml-service:
    build: ./ml-service
    container_name: atb-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atb-network

  backend:
    build: ./backend
    container_name: atb-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_MONGODB_URI: mongodb://mongo:27017/${MONGO_DATABASE}
      ML_SERVICE_URL: http://ml-service:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - atb-network

  frontend:
    build: ./frontend
    container_name: atb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - atb-network

networks:
  atb-network:
    driver: bridge

volumes:
  mongo_data:
  backend_uploads:
