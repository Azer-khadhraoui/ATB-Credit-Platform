# Template only — DO NOT put the real key here and DO NOT commit a filled-in copy.
# The actual Secret is created out-of-band, the same principle as the backend's JWT_SECRET
# env var: nothing sensitive lives in git.
#
#   kubectl create secret generic atb-jwt -n atb \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)"
#
# The backend Deployment reads JWT_SECRET from a Secret named `atb-jwt` (see 30-backend.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: atb-jwt
  namespace: atb
  labels:
    app.kubernetes.io/part-of: atb-credit-platform
type: Opaque
stringData:
  JWT_SECRET: replace-with-a-random-secret-of-at-least-32-characters
