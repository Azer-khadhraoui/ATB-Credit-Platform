# LoadBalancer on 4200 so the app opens at http://localhost:4200, the same URL as Compose
# (which mapped 4200:80). nginx inside the container still listens on 80.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: atb
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: atb-credit-platform
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 4200
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: atb
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: atb-credit-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: atb-credit-platform
    spec:
      containers:
        - name: frontend
          image: atb-credit-platform-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
