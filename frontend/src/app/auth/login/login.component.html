<div class="login-page">
  <div class="login-card">
    <div class="login-card__form">
      <img class="form-header__icon" src="/images/logoatbicon.webp" alt="ATB" />

      <div class="form-header">
        <h1>Bon retour</h1>
        <p class="subtitle">Connectez-vous pour accéder à votre compte</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <label for="matricule">Matricule</label>
        <div class="input-group">
          <i class="fa-regular fa-id-badge"></i>
          <input id="matricule" type="text" inputmode="numeric" maxlength="6" formControlName="matricule" placeholder="Entrez votre matricule" />
        </div>

        <label for="password">Mot de passe</label>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input id="password" type="password" formControlName="password" placeholder="Entrez votre mot de passe" />
        </div>

        <a class="forgot-link" href="#">Mot de passe oublié ?</a>

        <button type="submit" class="sign-in-btn">Se connecter</button>
      </form>

      <p class="create-account">
        Vous n'avez pas de compte ? <a routerLink="/signup">Créer un compte</a>
      </p>
    </div>

    <div class="login-card__visual">
      <img class="visual-photo" src="/images/imagesignin.png" alt="ATB - Un nouvel élan pour l'écoute" />

      <div class="visual-logo-badge">
        <img src="/images/logoatbbackgblanc.jpg.png" alt="ATB" />
      </div>
    </div>
  </div>
</div>
