# Test-only configuration. The secret here is a throwaway fixture, never used outside tests,
# so it is safe to commit — unlike the real key, which comes from JWT_SECRET at runtime.
jwt.secret=test-secret-key-for-unit-and-context-tests-0123456789
jwt.expiration=3600000

# Points the context test at the MongoDB the CI workflow starts as a service container.
spring.data.mongodb.uri=mongodb://localhost:27017/atb_credit_platform_test

# This file shadows the main application.properties on the test classpath (same name), so it must
# also supply every placeholder the context resolves at startup — not just the test overrides above.
ml.service.url=http://127.0.0.1:8000
app.upload.dir=uploads
app.upload.public-path=/uploads
