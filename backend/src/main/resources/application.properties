spring.application.name=backend
server.port=8081

spring.mongodb.uri=mongodb://localhost:27017/atb_credit_platform
spring.data.mongodb.auto-index-creation=true

logging.level.tn.atb.backend=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# JWT — the signing key is never committed. It must be supplied at runtime via the
# JWT_SECRET environment variable (see .env.example); the app refuses to start otherwise.
# HS256 requires at least 32 characters.
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File uploads (avatars)
app.upload.dir=uploads
app.upload.public-path=/uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ML service (FastAPI) — credit risk analysis
ml.service.url=http://127.0.0.1:8000