spring.application.name=backend
server.port=8081

spring.mongodb.uri=mongodb://localhost:27017/atb_credit_platform
spring.data.mongodb.auto-index-creation=true

logging.level.tn.atb.backend=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# JWT — dev secret (min 32 chars for HS256). Move to an env var before production.
jwt.secret=atb-credit-platform-dev-secret-key-change-me-in-production-2026
jwt.expiration=86400000

# File uploads (avatars)
app.upload.dir=uploads
app.upload.public-path=/uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ML service (FastAPI) — credit risk analysis
ml.service.url=http://127.0.0.1:8000