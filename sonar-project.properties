sonar.projectKey=Azer-khadhraoui_ATB-Credit-Platform
sonar.organization=azer-khadhraoui

sonar.sources=backend/src/main,frontend/src/app,ml-service/app
sonar.tests=backend/src/test,frontend/src/app,ml-service/tests
sonar.test.inclusions=**/*.spec.ts,**/*Tests.java,**/*Test.java,**/test_*.py
sonar.python.version=3.11

sonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/target/**,ml-service/notebooks/**,ml-service/data/**,ml-service/models/**

# Test files legitimately repeat setup boilerplate (TestBed wiring, HTTP mock scaffolding);
# duplicated arrange steps across specs are expected and not worth refactoring away.
sonar.cpd.exclusions=**/*.spec.ts,**/*Test.java,**/*Tests.java,**/test_*.py

sonar.java.binaries=backend/target/classes

# Coverage reports: JaCoCo (backend), pytest-cov (ML service), karma/lcov (frontend).
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.python.coverage.reportPaths=ml-service/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info

# Excluded from the coverage requirement (still analysed for bugs and code smells): code with no
# branching logic to unit-test — Lombok DTOs/entities, Spring wiring, the boot class and error types.
sonar.coverage.exclusions=\
  backend/src/main/java/tn/atb/backend/dto/**,\
  backend/src/main/java/tn/atb/backend/entity/**,\
  backend/src/main/java/tn/atb/backend/config/**,\
  backend/src/main/java/tn/atb/backend/exception/**,\
  backend/src/main/java/tn/atb/backend/BackendApplication.java,\
  frontend/src/main.ts,\
  frontend/src/environments/**,\
  frontend/src/app/**/*.routes.ts,\
  frontend/src/app/app.config.ts
